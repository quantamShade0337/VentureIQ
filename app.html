<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VentureIQ — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0F0F1A; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }

    /* Loading screen */
    #app-loading {
      position: fixed; inset: 0; background: #0F0F1A;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; z-index: 9999;
      transition: opacity .4s ease;
    }
    #app-loading.hidden { opacity: 0; pointer-events: none; }
    .loading-logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px;
    }
    .loading-mark {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #00C8B4, #007A6E);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,200,180,.35);
    }
    .loading-wordmark {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 22px; font-weight: 800; letter-spacing: -.02em;
      color: #EEEEF8;
    }
    .loading-wordmark span { color: #00C8B4; }
    .loading-bar {
      width: 200px; height: 2px; background: rgba(255,255,255,.07);
      border-radius: 1px; overflow: hidden;
    }
    .loading-fill {
      height: 100%; background: linear-gradient(90deg, #00C8B4, #F5C842);
      border-radius: 1px; animation: loadFill 1.2s ease forwards;
    }
    .loading-text {
      font-size: 12px; color: rgba(238,238,248,.3);
      letter-spacing: .04em;
    }
    @keyframes loadFill { from { width: 0; } to { width: 100%; } }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="app-loading">
    <div class="loading-logo">
      <div class="loading-mark">
        <svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round">
          <polyline points="1,12 5,7 9,9.5 15,3"/>
          <circle cx="15" cy="3" r="1.5" fill="#fff" stroke="none"/>
        </svg>
      </div>
      <span class="loading-wordmark">Venture<span>IQ</span></span>
    </div>
    <div class="loading-bar"><div class="loading-fill"></div></div>
    <div class="loading-text">Loading intelligence platform…</div>
  </div>

  <div id="root"></div>

  <!-- React + Babel CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- App script -->
  <script type="text/babel" src="app.js" data-presets="react"></script>

  <script>
    // Hide loading screen once React has mounted
    window.addEventListener('viq-ready', () => {
      const el = document.getElementById('app-loading');
      if (el) { el.classList.add('hidden'); setTimeout(() => el.remove(), 500); }
    });
    // Fallback
    setTimeout(() => {
      const el = document.getElementById('app-loading');
      if (el) { el.classList.add('hidden'); }
    }, 4000);
  </script>
</body>
</html>
