<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In – RizelIQ</title>
  <meta name="description" content="Sign in to your RizelIQ founder intelligence dashboard."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:    #070710;
      --surf:  #0D0D1A;
      --card:  #111122;
      --brd:   rgba(255,255,255,0.07);
      --brdhi: rgba(255,255,255,0.14);
      --txt:   #F0F0FA;
      --t2:    rgba(240,240,250,0.50);
      --t3:    rgba(240,240,250,0.26);
      --a:     #3ECFB2;
      --a2:    #2BAF96;
      --red:   #E85D5D;
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--txt);
      font-family:'Geist',sans-serif;
      -webkit-font-smoothing:antialiased;
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      position:relative; overflow:hidden;
    }
    .orb {
      position:absolute; border-radius:50%; pointer-events:none;
    }
    .orb-1 {
      width:600px; height:600px; top:-150px; left:50%; transform:translateX(-50%);
      background:radial-gradient(circle, rgba(62,207,178,.09) 0%, transparent 65%);
      filter:blur(70px);
    }
    .orb-2 {
      width:400px; height:400px; bottom:-100px; left:-100px;
      background:radial-gradient(circle, rgba(139,111,239,.07) 0%, transparent 70%);
      filter:blur(70px);
    }
    .grid-bg {
      position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.016) 1px, transparent 1px);
      background-size:52px 52px;
      mask-image:radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 100%);
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to { transform: rotate(360deg); } }

    .login-card {
      position:relative; z-index:10;
      background:var(--card); border:1px solid var(--brd);
      border-radius:20px; padding:44px 40px;
      width:100%; max-width:420px;
      box-shadow:0 30px 80px rgba(0,0,0,.6);
      animation: fadeUp .5s ease both;
    }

    .card-logo {
      display:flex; align-items:center; justify-content:center;
      gap:10px; margin-bottom:30px; text-decoration:none; color:var(--txt);
    }
    .logo-mark {
      width:36px; height:36px; border-radius:10px;
      background:linear-gradient(135deg,#3ECFB2,#1A8C78);
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 20px rgba(62,207,178,.28);
    }
    .logo-word {
      font-family:'Syne',sans-serif; font-size:20px; font-weight:800; letter-spacing:-.025em;
    }
    .logo-word em { color:var(--a); font-style:normal; }

    .card-title {
      font-family:'Syne',sans-serif; font-size:24px; font-weight:800;
      letter-spacing:-.03em; text-align:center; margin-bottom:8px;
    }
    .card-sub {
      font-size:13.5px; color:var(--t2); text-align:center;
      line-height:1.6; margin-bottom:32px;
    }

    /* Google button */
    .btn-google {
      width:100%; padding:13px 20px; border-radius:10px;
      border:1px solid var(--brdhi); background:rgba(255,255,255,.04);
      color:var(--txt); font-family:'Geist',sans-serif;
      font-size:14px; font-weight:600; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:10px;
      transition:all .2s; text-decoration:none;
      margin-bottom:24px;
    }
    .btn-google:hover { background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.2); }
    .btn-google svg { flex-shrink:0; }

    .divider {
      display:flex; align-items:center; gap:14px; margin-bottom:24px;
    }
    .divider-line { flex:1; height:1px; background:var(--brd); }
    .divider-txt { font-size:11.5px; color:var(--t3); font-weight:500; white-space:nowrap; }

    /* Form */
    .form-group { margin-bottom:16px; }
    .form-label {
      display:block; font-size:12px; font-weight:600;
      color:var(--t2); margin-bottom:7px; letter-spacing:.03em;
    }
    .form-input {
      width:100%; padding:12px 14px; border-radius:9px;
      border:1px solid var(--brd); background:var(--surf);
      color:var(--txt); font-family:'Geist',sans-serif;
      font-size:14px; transition:border-color .15s, box-shadow .15s;
      outline:none;
    }
    .form-input::placeholder { color:var(--t3); }
    .form-input:focus { border-color:rgba(62,207,178,.4); box-shadow:0 0 0 3px rgba(62,207,178,.08); }

    .forgot-row {
      display:flex; justify-content:flex-end; margin-top:-8px; margin-bottom:20px;
    }
    .forgot-row a { font-size:12px; color:var(--a); text-decoration:none; }
    .forgot-row a:hover { text-decoration:underline; }

    .btn-submit {
      width:100%; padding:13px 20px; border-radius:10px;
      background:var(--a); color:#000;
      font-family:'Geist',sans-serif; font-size:14px; font-weight:700;
      cursor:pointer; border:none; transition:all .2s;
      box-shadow:0 3px 16px rgba(62,207,178,.25);
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-submit:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(62,207,178,.4); }
    .btn-submit:disabled { opacity:.6; cursor:not-allowed; transform:none; }

    .spinner {
      width:16px; height:16px; border:2px solid rgba(0,0,0,.2);
      border-top-color:#000; border-radius:50%;
      animation: spin .7s linear infinite; display:none;
    }
    .btn-submit.loading .spinner { display:block; }
    .btn-submit.loading .btn-label { display:none; }

    /* Error */
    .error-msg {
      background:rgba(232,93,93,.1); border:1px solid rgba(232,93,93,.2);
      border-radius:9px; padding:11px 14px;
      font-size:13px; color:#E85D5D;
      display:none; margin-bottom:16px;
    }
    .error-msg.visible { display:block; }

    .card-footer {
      text-align:center; margin-top:24px;
      font-size:13px; color:var(--t3);
    }
    .card-footer a { color:var(--a); text-decoration:none; font-weight:600; }
    .card-footer a:hover { text-decoration:underline; }

    .terms {
      text-align:center; margin-top:20px;
      font-size:11.5px; color:var(--t3); line-height:1.6;
    }
    .terms a { color:var(--t2); text-decoration:none; }
    .terms a:hover { color:var(--txt); }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="grid-bg"></div>

  <div class="login-card">
    <a href="index.html" class="card-logo">
      <div class="logo-mark">
        <svg width="17" height="17" viewBox="0 0 18 18" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1,14 6,8 10,11 17,3"/>
          <polyline points="12,3 17,3 17,8"/>
        </svg>
      </div>
      <div class="logo-word">Rizel<em>IQ</em></div>
    </a>

    <div class="card-title">Welcome Back</div>
    <div class="card-sub">Access your founder intelligence dashboard.</div>

    <!-- Google OAuth -->
    <button class="btn-google" id="googleBtn" onclick="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-txt">or continue with email</div>
      <div class="divider-line"></div>
    </div>

    <div class="error-msg" id="errorMsg">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:inline;margin-right:6px;vertical-align:middle;">
        <circle cx="8" cy="8" r="7"/><line x1="8" y1="5" x2="8" y2="8"/><circle cx="8" cy="11" r=".5" fill="currentColor"/>
      </svg>
      <span id="errorText">Invalid email or password.</span>
    </div>

    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input type="email" id="email" class="form-input" placeholder="you@company.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input type="password" id="password" class="form-input" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password"/>
    </div>
    <div class="forgot-row">
      <a href="#">Forgot password?</a>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="handleEmailLogin()">
      <div class="spinner"></div>
      <span class="btn-label">Sign in</span>
    </button>

    <div class="card-footer">
      Don't have an account? <a href="signup.html">Create account</a>
    </div>
    <div class="terms">
      By continuing, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
    </div>
  </div>

  <script>
    function handleGoogleLogin() {
      const btn = document.getElementById('googleBtn');
      btn.style.opacity = '.7';
      btn.style.pointerEvents = 'none';
      btn.innerHTML = `
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="animation:spin .7s linear infinite;display:block;">
          <circle cx="8" cy="8" r="6" stroke="rgba(255,255,255,.2)" stroke-width="2"/>
          <path d="M8 2 A6 6 0 0 1 14 8" stroke="#3ECFB2" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Redirecting to Google...
      `;
      // In production: trigger Google OAuth flow
      // e.g. window.location.href = '/auth/google'
      setTimeout(() => {
        window.location.href = 'app.html';
      }, 1800);
    }

    function handleEmailLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');
      const errorText = document.getElementById('errorText');

      errorMsg.classList.remove('visible');

      if (!email || !email.includes('@')) {
        errorText.textContent = 'Please enter a valid email address.';
        errorMsg.classList.add('visible');
        return;
      }
      if (!password || password.length < 6) {
        errorText.textContent = 'Password must be at least 6 characters.';
        errorMsg.classList.add('visible');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      // In production: POST to /api/auth/login
      setTimeout(() => {
        btn.classList.remove('loading');
        btn.disabled = false;
        // Simulate auth success — redirect to dashboard
        window.location.href = 'app.html';
      }, 1600);
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleEmailLogin();
    });
  </script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
